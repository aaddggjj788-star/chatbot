<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サポートセンター</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }

    #app { width: 620px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); overflow: hidden; }

    /* ヘッダー */
    #header { background: #0070f3; color: #fff; padding: 18px 24px; }
    #header h1 { font-size: 1.1rem; font-weight: bold; }
    #header p { font-size: 0.8rem; opacity: 0.85; margin-top: 4px; }

    /* ジャンル選択画面 */
    #genre-screen { padding: 24px; }
    #genre-screen h2 { font-size: 1rem; color: #333; margin-bottom: 6px; }
    #genre-screen p { font-size: 0.85rem; color: #666; margin-bottom: 20px; line-height: 1.6; }
    #genre-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .genre-btn {
      padding: 14px 12px; border: 2px solid #e0e8f0; border-radius: 10px;
      background: #f8fafc; cursor: pointer; font-size: 0.88rem; color: #333;
      text-align: left; transition: all 0.15s; line-height: 1.4;
    }
    .genre-btn:hover { border-color: #0070f3; background: #eff6ff; color: #0070f3; }
    .genre-btn .icon { font-size: 1.2rem; display: block; margin-bottom: 4px; }
    .genre-btn.full { grid-column: 1 / -1; }

    /* チャット画面 */
    #chat-screen { display: none; flex-direction: column; height: 70vh; min-height: 480px; }
    #genre-tag { padding: 10px 20px; background: #eff6ff; border-bottom: 1px solid #dbeafe; font-size: 0.85rem; color: #1d4ed8; }
    #genre-tag span { font-weight: bold; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .msg { max-width: 82%; padding: 10px 14px; border-radius: 12px; line-height: 1.6; font-size: 0.92rem; white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: #0070f3; color: #fff; border-bottom-right-radius: 3px; }
    .msg.assistant { align-self: flex-start; background: #f3f4f6; color: #1f2937; border-bottom-left-radius: 3px; }
    .msg.error { align-self: flex-start; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; font-size: 0.85rem; border-radius: 8px; }

    /* 考え中インジケーター */
    .msg.thinking { align-self: flex-start; background: #f3f4f6; color: #6b7280; font-size: 0.88rem; border-bottom-left-radius: 3px; }
    .thinking-dots span { animation: blink 1.2s infinite; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.1; } 40% { opacity: 1; } }

    /* 選択肢ボタン */
    .option-group { align-self: flex-start; max-width: 96%; display: flex; flex-direction: column; gap: 6px; }
    .option-btn {
      padding: 10px 16px; border: 1.5px solid #0070f3; border-radius: 10px;
      background: #fff; cursor: pointer; font-size: 0.88rem; color: #0070f3;
      text-align: left; transition: all 0.15s; line-height: 1.4; width: 100%;
    }
    .option-btn:hover { background: #eff6ff; }
    .option-btn:disabled { opacity: 0.45; cursor: not-allowed; border-color: #d1d5db; color: #9ca3af; }

    #input-area { padding: 12px 16px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; align-items: flex-end; }
    #input { flex: 1; padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 10px; font-size: 0.92rem; resize: none; min-height: 44px; max-height: 120px; outline: none; font-family: inherit; }
    #input:focus { border-color: #0070f3; }
    #send { padding: 10px 18px; background: #0070f3; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 0.92rem; white-space: nowrap; height: 44px; }
    #send:disabled { background: #93c5fd; cursor: not-allowed; }
    #back-btn { padding: 8px 14px; background: none; border: 1.5px solid #d1d5db; border-radius: 8px; cursor: pointer; font-size: 0.82rem; color: #6b7280; display: block; margin: 12px 16px 0; }
    #back-btn:hover { border-color: #9ca3af; color: #374151; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>🎧 サポートセンター</h1>
    <p id="header-greeting"></p>
  </div>

  <!-- ジャンル選択 -->
  <div id="genre-screen">
    <h2>お問い合わせジャンル</h2>
    <p>お問い合わせの内容に近い項目をお選びください。<br>該当する項目が無い場合はその他（自由入力）よりお問い合わせ内容をご記述ください。</p>
    <div id="genre-buttons"></div>
  </div>

  <!-- チャット -->
  <div id="chat-screen">
    <button id="back-btn">← ジャンル選択に戻る</button>
    <div id="genre-tag">ジャンル：<span id="genre-label"></span></div>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="input" placeholder="ご入力ください…" rows="1"></textarea>
      <button id="send">送信</button>
    </div>
  </div>
</div>

<script>
  // --- DOM ---
  const genreScreen    = document.getElementById('genre-screen');
  const chatScreen     = document.getElementById('chat-screen');
  const genreLabel     = document.getElementById('genre-label');
  const messagesEl     = document.getElementById('messages');
  const inputEl        = document.getElementById('input');
  const sendBtn        = document.getElementById('send');
  const backBtn        = document.getElementById('back-btn');
  const headerGreeting = document.getElementById('header-greeting');

  // --- GETパラメータ取得（Shift-JIS / UTF-8 両対応）---
  function decodeParam(v) {
    if (!v) return '';
    const s = v.replace(/\+/g, ' ');
    try { return decodeURIComponent(s); } catch (e) {
      const bytes = [];
      for (let i = 0; i < s.length; i++) {
        if (s[i] === '%' && i + 2 < s.length) { bytes.push(parseInt(s.substr(i + 1, 2), 16)); i += 2; }
        else { bytes.push(s.charCodeAt(i) & 0xff); }
      }
      try { return new TextDecoder('shift-jis').decode(new Uint8Array(bytes)); } catch { return v; }
    }
  }
  function getRawParams() {
    const r = {};
    window.location.search.slice(1).split('&').forEach(p => {
      const eq = p.indexOf('=');
      if (eq !== -1) r[decodeURIComponent(p.slice(0, eq))] = p.slice(eq + 1);
    });
    return r;
  }
  const raw = getRawParams();
  const userInfo = {
    user_id:    decodeParam(raw.user_id),
    user_name:  decodeParam(raw.user_name),
    user_point: decodeParam(raw.user_point),
    user_token: decodeParam(raw.user_token),
  };
  console.log('【GETパラメータ取得】', userInfo);

  // --- 時間帯別挨拶 ---
  function getGreeting() {
    const h = new Date().getHours();
    if (h >= 5 && h < 11) return 'おはようございます';
    if (h >= 11 && h < 18) return 'こんにちは';
    return 'こんばんは';
  }
  headerGreeting.textContent = userInfo.user_name
    ? `${getGreeting()}。${userInfo.user_name}さん。`
    : 'ご質問の内容に最も近いジャンルを選んでください';

  // --- ジャンルデータ（選択肢ラベルのみ・回答はClaude生成）---
  const GENRE_DATA = [
    { key: 'ポイントについて', icon: '💰',
      subs: ['1ポイントの金額を知りたい', 'メッセージ送信に必要なポイントを知りたい'] },
    { key: 'ポイント購入方法', icon: '🛒',
      subs: ['ポイントの購入方法を知りたい', '購入したけどポイントが付いていない'] },
    { key: '機能の説明', icon: '📖',
      subs: ['送信したメッセージの確認方法', 'ラッキーくじについて', '割引チケットについて'] },
    { key: 'メッセージ機能に関して', icon: '💬',
      subs: ['先生から返信が来ない', '先生に伝言をお願いしたい'] },
    { key: '所有ポイントに関して', icon: '⚠️',
      subs: ['追加されたポイントがおかしい', '送信履歴とポイントが合わない'] },
    { key: 'キャンペーンについて', icon: '🎁' },
    { key: 'その他（自由入力）', icon: '✏️', full: true },
  ];

  // --- 定数 ---
  const ESCALATION_MSG = 'こちらでは対応が難しいお問い合わせの内容となる為、サポートスタッフへお客様のお問い合わせを転送させて頂きます。今頂いたお問い合わせの内容を引用し文章を作成してよい場合は「1」を、改めて問い合わせ内容を入力される場合は「2」とご入力ください。';

  // --- 状態 ---
  let currentGenreKey = '';
  let chatHistory = [];
  let escalationState = null; // null | 'awaiting_choice' | 'awaiting_custom'
  let busy = false;

  // --- ジャンルボタン生成 ---
  const genreButtonsEl = document.getElementById('genre-buttons');
  GENRE_DATA.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'genre-btn' + (g.full ? ' full' : '');
    btn.innerHTML = `<span class="icon">${g.icon}</span>${g.key}`;
    btn.addEventListener('click', () => selectGenre(g));
    genreButtonsEl.appendChild(btn);
  });

  // --- ジャンル選択 ---
  function selectGenre(genre) {
    currentGenreKey = genre.key;
    chatHistory = [];
    escalationState = null;
    busy = false;
    messagesEl.innerHTML = '';
    genreLabel.textContent = genre.key;
    genreScreen.style.display = 'none';
    chatScreen.style.display = 'flex';

    if (genre.subs && genre.subs.length > 0) {
      addMsg('assistant', `「${genre.key}」についてのご質問ですね。\n以下よりお選びいただくか、お困りの内容をそのままご入力ください。`);
      addOptionButtons(genre.subs);
      inputEl.placeholder = '該当しない場合はこちらにご入力ください';
    } else {
      addMsg('assistant', `「${genre.key}」についてのご質問ですね。\nお困りの内容をお気軽にご入力ください。`);
      inputEl.placeholder = 'ご入力ください…';
    }
    inputEl.focus();
  }

  // --- 戻るボタン ---
  backBtn.addEventListener('click', () => {
    chatScreen.style.display = 'none';
    genreScreen.style.display = 'block';
    escalationState = null;
    busy = false;
  });

  // --- メッセージ追加 ---
  function addMsg(type, text) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addThinking() {
    const div = document.createElement('div');
    div.className = 'msg thinking';
    div.innerHTML = '考え中<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addMsgWithLink(text, url) {
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.appendChild(document.createTextNode(text + '\n\n'));
    const a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.textContent = url;
    a.style.cssText = 'word-break:break-all;color:#0070f3;';
    div.appendChild(a);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addOptionButtons(labels) {
    const container = document.createElement('div');
    container.className = 'option-group';
    labels.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = label;
      btn.addEventListener('click', () => {
        if (busy) return;
        container.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        callClaude(label);
      });
      container.appendChild(btn);
    });
    messagesEl.appendChild(container);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function buildEscalationUrl(token, message) {
    const ts = Math.floor(Date.now() / 1000);
    return `https://x7j4l2p9m1.com/log_index.php?page=kbt&kbt=275&s=${ts}&ddv=${encodeURIComponent(token || '')}&message=${encodeURIComponent(message)}`;
  }

  // --- Claudeへ送信（ボタン選択・テキスト入力どちらも共通）---
  async function callClaude(text) {
    busy = true;
    sendBtn.disabled = true;
    addMsg('user', text);
    chatHistory.push({ role: 'user', content: text });

    const thinking = addThinking();
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ genre: currentGenreKey, messages: chatHistory, ...userInfo }),
      });
      const data = await res.json();
      thinking.remove();

      if (data.error) {
        addMsg('error', 'エラー: ' + data.error);
        chatHistory.pop();
        return;
      }

      if (data.can_answer) {
        addMsg('assistant', data.reply);
        chatHistory.push({ role: 'assistant', content: data.reply });
        inputEl.placeholder = '引き続きご質問があればご入力ください';
      } else {
        addMsg('assistant', ESCALATION_MSG);
        chatHistory.push({ role: 'assistant', content: ESCALATION_MSG });
        escalationState = 'awaiting_choice';
        inputEl.placeholder = '「1」または「2」をご入力ください';
      }
    } catch (err) {
      thinking.remove();
      addMsg('error', '通信エラー: ' + err.message);
      chatHistory.pop();
    } finally {
      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // --- 送信ボタン・Enterキー処理 ---
  async function send() {
    const text = inputEl.value.trim();
    if (!text || busy) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // エスカレーション：1 or 2 の選択待ち
    if (escalationState === 'awaiting_choice') {
      if (text === '1') {
        addMsg('user', text);
        chatHistory.push({ role: 'user', content: text });
        busy = true;
        sendBtn.disabled = true;
        const thinking = addThinking();
        try {
          const res = await fetch('/generate-inquiry', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: chatHistory, genre: currentGenreKey }),
          });
          const data = await res.json();
          thinking.remove();
          const generated = data.message || '';
          addMsgWithLink(
            `かしこまりました。お客様のお問い合わせを元にサポートスタッフへ転送されるお問い合わせ文章を作成いたしました。\n\n${generated}\n\n下記をご確認いただき相違がなければ下記URLをクリックしサポートセンターへお問い合わせを送信してください。`,
            buildEscalationUrl(userInfo.user_token, generated)
          );
          escalationState = null;
        } catch (err) {
          thinking.remove();
          addMsg('error', '通信エラー: ' + err.message);
        } finally {
          busy = false;
          sendBtn.disabled = false;
          inputEl.focus();
        }
      } else if (text === '2') {
        addMsg('user', text);
        chatHistory.push({ role: 'user', content: text });
        addMsg('assistant', 'ありがとうございます。お客様からのお問い合わせ内容をご入力ください。');
        escalationState = 'awaiting_custom';
        inputEl.placeholder = 'お問い合わせ内容をご入力ください';
        inputEl.focus();
      } else {
        addMsg('user', text);
        addMsg('assistant', '「1」または「2」をご入力ください。');
        inputEl.focus();
      }
      return;
    }

    // エスカレーション：カスタムメッセージ入力待ち
    if (escalationState === 'awaiting_custom') {
      addMsg('user', text);
      chatHistory.push({ role: 'user', content: text });
      addMsgWithLink(
        'ありがとうございます。上記の内容を転送いたしますので下記URLをクリックしサポートセンターへお問い合わせを送信してください。',
        buildEscalationUrl(userInfo.user_token, text)
      );
      escalationState = null;
      inputEl.placeholder = 'ご入力ください…';
      inputEl.focus();
      return;
    }

    await callClaude(text);
  }

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
